# Schema Validation CI Pipeline
# 스키마 검증 자동화 워크플로우
#
# 목적: 코드 변경 시 데이터베이스 스키마 무결성 자동 검증
# 트리거: push, pull_request 이벤트
# 우선순위: 다른 테스트보다 먼저 실행

name: Schema Validation

on:
  push:
    branches: ["main", "develop", "feature/*"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # Job 1: 스키마 무결성 검증 (최우선 실행)
  schema-integrity-check:
    name: Schema Integrity Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv package manager
        run: |
          pip install --upgrade pip
          pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run schema integrity tests
        run: |
          pytest tests/contract/test_schema_integrity.py -v \
            --tb=short --color=yes

  # Job 2: 마이그레이션 검증 (스키마 체크 후 실행)
  migration-verification:
    name: Migration Verification
    runs-on: ubuntu-latest
    needs: schema-integrity-check
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Make verification script executable
        run: chmod +x src/db/migrations/verify_migration.sh

      - name: Verify latest migration (006)
        run: |
          ./src/db/migrations/verify_migration.sh 006

  # Job 3: Migration Dry-Run for PRs (PR에만 실행)
  migration-dry-run:
    name: Migration Dry-Run (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: schema-integrity-check
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 git 히스토리 필요

      - name: Check if migration files changed
        id: check-migration
        run: |
          # PR에서 변경된 마이그레이션 파일 확인
          CHANGED_FILES=$(git diff --name-only \
            origin/${{ github.base_ref }}...HEAD \
            | grep '^src/db/migrations/.*\.sql$' || true)

          if [ -n "$CHANGED_FILES" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.11
        if: steps.check-migration.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.check-migration.outputs.changed == 'true'
        run: |
          pip install --upgrade pip
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Run migration dry-run
        if: steps.check-migration.outputs.changed == 'true'
        run: |
          echo "Changed migration files:"
          echo "${{ steps.check-migration.outputs.files }}"
          echo ""
          echo "Running dry-run for all migrations..."

          # 임시 데이터베이스로 dry-run
          export TEST_DB_PATH="test_migration_dryrun.db"
          python -c "
          import sqlite3
          from pathlib import Path

          # 기본 스키마만 생성 (빈 DB)
          db_path = Path('$TEST_DB_PATH')
          db_path.unlink(missing_ok=True)
          conn = sqlite3.connect(str(db_path))
          conn.close()
          print(f'Created test database: {db_path}')
          "

          # 마이그레이션 순차 적용 시뮬레이션
          for migration in src/db/migrations/*.sql; do
            echo "Testing: $migration"
            sqlite3 $TEST_DB_PATH < "$migration" || {
              echo "ERROR: Migration failed - $migration"
              exit 1
            }
          done

          echo "✅ All migrations applied successfully in dry-run"
          rm -f $TEST_DB_PATH

      - name: Comment PR with dry-run result
        if: |
          steps.check-migration.outputs.changed == 'true' &&
          success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Migration dry-run passed successfully!'
            })
