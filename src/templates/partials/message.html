<div class="message message-{{ message.role }}" data-message-id="{{ message.id }}">
  <div class="avatar {{ message.role }}">
    {% if message.role == 'teacher' %}
    T
    {% elif message.role == 'student' %}
    S
    {% elif message.role == 'tutor' %}
    !
    {% endif %}
  </div>

  <div class="message-content-wrapper">
    <div class="message-bubble">
      {{ message.content }}
    </div>
    <div class="message-meta">
      <span class="timestamp">{{ message.created_at.strftime('%H:%M') if message.created_at else '' }}</span>
    </div>
  </div>
</div>
